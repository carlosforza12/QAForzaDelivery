[pytest]
# Configuración del plugin pytest-base-url
base_url = url

# Agregamos parámetros por defecto para el reporte
addopts = --alluredir=allure-results --junitxml=reportes/junit-results.xml -W ignore::urllib3.exceptions.InsecureRequestWarning

# Solo buscar tests en la carpeta tests/
testpaths = tests

# Ignorar la carpeta Implementar (proyecto de referencia)
norecursedirs = Implementar .git __pycache__ .pytest_cache allure-results reportes .venv

# NUEVO: Le dice a Python que reconozca la raíz del proyecto para importar módulos
pythonpath = .

markers =
    creacionGuias_COD_COLLET: Ejecuta el flujo de guias COD Collet (UI - Playwright)
    recoleccion: Ejecuta el flujo de recoleccion masiva de guias (UI - Playwright)
    creacion_COD_API: Crea guias COD para Guatemala via API cifrada (migrado desde C# ApiForza)
    creacion_STD_API_contenedor: Crea guias STD GT via API y las agrupa en contenedor
    creacion_COD_DROPI: Creacion de guias COD DROPI
    recoleccion_API: Crea ordenes de recoleccion via SetPickupServiceByIntegration
    recoleccion_existente: Crea una recoleccion existente al mismo cliente
    creacion_COD_BOXFUL_SV: Creacion de guias Boxful sv
    proof_of_delivery_exitoso: Obtener prueba de entrega
    proof_of_delivery_error: Guia que no existe
    proof_of_delivery: Todos los escenarios
    recoleccion_visita_fallida: Ejecuta el flujo App Courier de recoleccion con visita fallida
    creacionGuias_COD_COLLET_EXEC: Creacion de guias cod collet express center
    creacionGuias_STD_EXEC: Creacion de guias STD express center
    creacionGuias_COD_COLLET_corporativo: Creacion de guias COD collet portal corporativo
    creacionGuias_STD_corporativo: Creacion de guias STD portal corporativo
    proof_of_delivery_produccion: Producion
    creacion_COD_QA: Guias para validar incidencias en QA
    tracking_publico_exitoso: Consulta tracking público vía GetTrackOrderDetail (QA exitoso)
    tracking_publico_error: Consulta tracking público vía GetTrackOrderDetail (QA guía inexistente)
    tracking_publico_produccion: Consulta tracking público vía GetTrackOrderDetail (Producción)
    creacion_COD_HN: Creacion de guias COD para Honduras via API cifrada (migrado desde C# ApiForza)
    creacion_COD_SV: Creacion de guias COD para El Salvador via API cifrada (migrado desde C# ApiForza)
    tracking_publico_produccion_error: Consulta tracking público vía GetTrackOrderDetail con guía inexistente (Producción)
    intercept_and_return_exitoso: Ejecuta endpoint InterceptAndReturn — bloqueo ya activo (localhost)
    intercept_and_return_exitoso_exisentente: Ejecuta endpoint InterceptAndReturn — guía con bloqueo previo (localhost)
    intercept_bloqueo_creado: Ejecuta endpoint InterceptAndReturn — bloqueo creado por primera vez (localhost)
    intercept_guia_entregada: Ejecuta endpoint InterceptAndReturn — guía ya entregada, no se puede bloquear (localhost)
    bloquear_entrega_exitoso: Ejecuta endpoint InterceptAndReturn — bloqueo creado exitosamente (localhost)
    intercept_guia_no_existe: Ejecuta endpoint InterceptAndReturn — guía inexistente (localhost)
    error_500: Escenarios que validan respuesta HTTP 500 Internal Server Error
    code_200: Escenarios que validan respuesta HTTP 200 OK
    code_400: Escenarios que validan respuesta HTTP 400 Bad Request 
    code_404: Escenarios que validan respuesta HTTP 404 Not Found
    code_409: Escenarios que validan respuesta HTTP 409 Conflict
    code_500: Escenarios que validan respuesta HTTP 500 Internal Server Error
    proof_of_delivery_local: Escenarios de proof of delivery que se ejecutan en ambiente local
    code_200_prod: Proof of delivery — respuesta HTTP 200 OK en producción
    code_400_prod: Proof of delivery — respuesta HTTP 400 Bad Request en producción
    code_404_prod: Proof of delivery — respuesta HTTP 404 Not Found en producción
    code_409_prod: Proof of delivery — respuesta HTTP 409 Conflict en producción
    code_500_prod: Proof of delivery — respuesta HTTP 500 Internal Server Error en producción
    bloquear_entrega_exitoso_produccion: Ejecuta endpoint InterceptAndReturn — bloqueo creado exitosamente (producción)
    creacion_COD_SV_produccion: Creacion de guias COD para El Salvador via API cifrada (producción)
    creacion_COD_HN_produccion: Creacion de guias COD para Honduras via API cifrada (producción)


