[pytest]
# Configuración del plugin pytest-base-url
base_url = url

# Agregamos parámetros por defecto para el reporte
addopts = --alluredir=allure-results --junitxml=reportes/junit-results.xml -W ignore::urllib3.exceptions.InsecureRequestWarning

# Solo buscar tests en la carpeta tests/
testpaths = tests

# Ignorar la carpeta Implementar (proyecto de referencia)
norecursedirs = Implementar .git __pycache__ .pytest_cache allure-results reportes .venv

# NUEVO: Le dice a Python que reconozca la raíz del proyecto para importar módulos
pythonpath = .

markers =
    creacionGuias_COD_COLLET: Ejecuta el flujo de guias COD Collet (UI - Playwright)
    recoleccion: Ejecuta el flujo de recoleccion masiva de guias (UI - Playwright)
    creacion_COD_API: Crea guias COD para Guatemala via API cifrada (migrado desde C# ApiForza)
    creacion_STD_API_contenedor: Crea guias STD GT via API y las agrupa en contenedor
    creacion_COD_DROPI: Creacion de guias COD DROPI
    recoleccion_API: Crea ordenes de recoleccion via SetPickupServiceByIntegration
    recoleccion_existente: Crea una recoleccion existente al mismo cliente
    creacion_COD_BOXFUL_SV: Creacion de guias Boxful sv
    proof_of_delivery_exitoso: Obtener prueba de entrega
    proof_of_delivery_error: Guia que no existe
    proof_of_delivery: Todos los escenarios
    recoleccion_visita_fallida: Ejecuta el flujo App Courier de recoleccion con visita fallida
    creacionGuias_COD_COLLET_EXEC: Creacion de guias cod collet express center
    creacionGuias_STD_EXEC: Creacion de guias STD express center
    creacionGuias_COD_COLLET_corporativo: Creacion de guias COD collet portal corporativo
    creacionGuias_STD_corporativo: Creacion de guias STD portal corporativo
    proof_of_delivery_produccion: Producion
    mis_envios_carga_inicial: Carga de Mis Envios tras login EXEC
    mis_envios_filtros_estado: Filtros de estado en Mis Envios (Todos / Por realizar / En proceso / Completados)
    mis_envios_busqueda_guia: Busqueda por numero de guia en Mis Envios
    mis_envios_busqueda_sin_resultados: Busqueda sin resultados en Mis Envios
    mis_envios_filtro_fecha: Filtro por rango de fechas en Mis Envios
    mis_envios_paginacion: Paginacion de resultados en Mis Envios
    mis_envios_rastreo: Clic en guia abre el rastreo en Mis Envios
    mis_envios_generar_excel: Boton Generar Excel visible y habilitado en Mis Envios
    mis_envios_reimprimir_guias: Boton Reimprimir Guias se habilita al seleccionar guias en Mis Envios
    el_rastreo: Rastreo de guías en Portal Express Center (UI)
    devoluciones_exc: Flujo de Devoluciones EXC en Portal Express Center (UI)

